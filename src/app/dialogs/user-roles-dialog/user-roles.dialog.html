<div mat-dialog-title>{{ 'dialogs.userRoles.texts.userRoles' | translate }}</div>
<div mat-dialog-content>

    <div class="flex-col gap-0 margin-top-5">
        <mat-checkbox name="administrator" [disableRipple]="true" [(ngModel)]="isAdministrator" (click)="onChangeAdministrator()">
            {{ 'common.labels.administrator' | translate }}
        </mat-checkbox>
        <mat-checkbox name="moderator" [disableRipple]="true" [(ngModel)]="isModerator" (click)="onChangeModerator()">
            {{ 'common.labels.moderator' | translate }}
        </mat-checkbox>
        <mat-checkbox name="member" [disableRipple]="true" [(ngModel)]="isMember" disabled>
            {{ 'common.labels.member' | translate }}
        </mat-checkbox>
    </div>
</div>
<div mat-dialog-actions>
    <button matButton="text" type="button" (click)="onNoClick()">{{ 'common.actions.close' | translate }}</button>
</div>
