<form name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
    <div mat-dialog-content>
        <div class="margin-bottom-10 padding-top-5">
            {{ text() }}
        </div>
    </div>
    <div mat-dialog-actions>
        <button matButton="text" type="button" (click)="onNoClick()">{{ 'components.dialogCommon.actions.no' | translate }}</button>
        <button matButton="filled" type="submit" cdkFocusInitial>{{ 'components.dialogCommon.actions.yes' | translate }}</button>
    </div>
</form>
