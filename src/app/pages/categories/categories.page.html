@if (isReady()) {
    <div animate.enter="fade-in" [ngClass]="{ 'padding-30': !isHandset(), 'padding-10': isHandset() }">
        <section>
            <h1>
                {{ 'pages.categories.title' | translate }}
                <div class="fs-60 text-muted">{{ 'pages.categories.subtitle' | translate }}</div>
            </h1>
        </section>
        <app-category-gallery [categories]="categories()"></app-category-gallery>
    </div>
}
