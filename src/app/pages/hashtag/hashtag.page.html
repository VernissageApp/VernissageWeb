@if (isReady()) {
    <div animate.enter="fade-in">
        <section [ngClass]="{ 'padding-30': !isHandset(), 'padding-10': isHandset() }">
            <div class="hashtag-header">
                <h1><mat-icon>tag</mat-icon> {{ hashtag() }}</h1>

                @if (signedInUser()) {
                    @if (isFollowActionInProgress()) {
                        <button type="button" matButton="text" [attr.aria-label]="'pages.hashtag.actions.followActionInProgressAriaLabel' | translate" disabled="disabled">{{ 'common.labels.processing' | translate }}...</button>
                    } @else {
                        @if (isFollowed()) {
                            <button type="button" (click)="onToggleHashtagFollow()" matButton="tonal" [attr.aria-label]="'pages.hashtag.actions.unfollowAriaLabel' | translate">{{ 'common.actions.unfollow' | translate }}</button>
                        } @else {
                            <button type="button" (click)="onToggleHashtagFollow()" matButton="filled" [attr.aria-label]="'pages.hashtag.actions.followAriaLabel' | translate">{{ 'common.actions.follow' | translate }}</button>
                        }
                    }
                }
            </div>
        </section>

        @if (statuses(); as statusesArray) {
            <app-gallery [statuses]="statusesArray" [startUrl]="pageUrl"></app-gallery>
        }
    </div>
}
